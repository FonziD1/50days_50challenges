<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>24th - Content Place Holder </title>
</head>
<body>
    
    <div class="card">
        <div class="card-header animated-bg" id="header">
            <img style="width: 1000px" src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Laptop">

        </div>

        <div class="card-content">
            <div class="card-title animated-bg animated-bg-text" id="title">Lorem ipsum dolor sit amet.</div>
            <p class="card-excerpt" id="excerpt">
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Exercitationem, vitae.
                <span class="animated-bg animated-bg-text">&nbsp;</span>
                <span class="animated-bg animated-bg-text">&nbsp;</span>
                <span class="animated-bg animated-bg-text">&nbsp;</span>
            </p>
            <div class="author">
                <div class="profile-img animated-bg" id="profile_img">
                    <img src="https://randomuser.me/api/portraits/men/45.jpg" "alt="">
                </div>
                <div class="author-info">
                    <strong class="animated-bg animated-bg-text" id="id">John Doe</strong>
                    <small class="animated-bg animated-bg-text">Oct 08, 2020</small>
                </div>
            </div>
        </div>

    </div>

    <div class="kinetic"></div>
    <script src="js.js"></script>
</body>
</html>

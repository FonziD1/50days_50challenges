<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>26th - Double Vertical Slider</title>
</head>
<body>
  <div class="slider-container">
    <div class="left-slide">
        <div style="background-color: #FD3955">
            <h1>Nature flower</h1>
            <p>all in pink</p>
        </div>
        <div style="background-color: #2600ff">
            <h1>Nature flower</h1>
            <p>all in blue</p>
        </div>
        <div style="background-color: #20ff03">
            <h1>Nature flower</h1>
            <p>all in green</p>
        </div>
        <div style="background-color: #fdcf37">
            <h1>Nature flower</h1>
            <p>all in yellow</p>
        </div>
    </div>
    <div class="right-slide">
        <div style="background-image: url(https://images.pexels.com/photos/1233414/pexels-photo-1233414.jpeg);"></div>
        <div style="background-image: url(https://images.pexels.com/photos/7262088/pexels-photo-7262088.jpeg);"></div>
        <div style="background-image: url(https://images.pexels.com/photos/34927720/pexels-photo-34927720.jpeg);"></div>
        <div style="background-image: url(https://images.pexels.com/photos/409696/pexels-photo-409696.jpeg);"></div>
    </div>
    <div class="action-buttons">
        <button class="down-button"><i class="fa fa-arrow-down"></i></button>
        <button class="down-button"><i class="fa fa-arrow-up"></i></button>
    </div>
  </div>







    <script src="js.js"></script>
</body>
</html>
